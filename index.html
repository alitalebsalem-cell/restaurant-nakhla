<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطاعم ومطابخ النخلة</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->

<header class="header">

<button class="icon-btn" onclick="toggleMenu()">☰</button>

<div class="header-center">
<div class="header-title">مطاعم ومطابخ النخلة</div>
<div class="header-sub">أشهى المأكولات اليمنية</div>
</div>

<a href="cart.html" style="text-decoration:none">
<button class="icon-btn">
🛒
<span id="cartCount">0</span>
</button>
</a>

</header>

<!-- Sidebar -->

<div id="sideMenu" style="
position:fixed;
top:0;
right:-300px;
width:280px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,.2);
z-index:9999;
padding:20px;
transition:.3s;
">

<h2 style="color:#8B735D;margin-bottom:20px">
مطاعم النخلة
</h2>

<a href="#products" style="display:block;margin:15px 0">
قائمة الطعام
</a>

<a href="cart.html" style="display:block;margin:15px 0">
سلة المشتريات
</a>

<a href="https://wa.me/967730244894"
style="display:block;margin:15px 0">
واتساب
</a>

<button onclick="toggleMenu()"
style="
margin-top:20px;
padding:10px 20px;
background:#8B735D;
color:white;
border:none;
border-radius:10px;
">
إغلاق
</button>

</div>

<!-- Hero -->

<section class="hero">

<img src="images/logo.png"
class="hero-logo">

<h1 class="hero-title">
مرحباً بكم
</h1>

<p class="hero-desc">
اطلب وجبتك المفضلة بسهولة
</p>

<a
class="whatsapp"
href="https://wa.me/967730244894">
📱 اطلب عبر واتساب
</a>

</section>

<!-- Search -->

<div class="search-box">

<input
type="text"
class="search-input"
id="searchInput"
placeholder="ابحث عن صنف..."
onkeyup="searchProducts()">

</div>

<!-- Categories -->

<div class="categories">

<button class="cat-btn active"
onclick="filterCategory('all')">
الكل
</button>

<button class="cat-btn"
onclick="filterCategory('وجبات رئيسية')">
وجبات رئيسية
</button>

<button class="cat-btn"
onclick="filterCategory('مقبلات')">
مقبلات
</button>

<button class="cat-btn"
onclick="filterCategory('مشويات')">
مشويات
</button>

<button class="cat-btn"
onclick="filterCategory('مشروبات')">
مشروبات
</button>

<button class="cat-btn"
onclick="filterCategory('بيتزا')">
بيتزا
</button>

</div>

<!-- Products -->

<div id="products" class="products">

</div>

<script src="js/script.js"></script>

<script>

function toggleMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.right=="0px"){
menu.style.right="-300px";
}else{
menu.style.right="0";
}

}

function searchProducts(){

let search=document
.getElementById("searchInput")
.value.toLowerCase();

let cards=document
.querySelectorAll(".product-card");

cards.forEach(card=>{

let name=card
.querySelector(".product-name")
.innerText
.toLowerCase();

if(name.includes(search)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

function filterCategory(category){

let cards=document
.querySelectorAll(".product-card");

cards.forEach(card=>{

if(category=="all"){

card.style.display="block";

}else{

if(card.dataset.category==category){

card.style.display="block";

}else{

card.style.display="none";

}

}

});

}

</script>
<script src="js/products.js"></script>
</body>
</html>
