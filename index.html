<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم النخلة</title>

<style>
body{
font-family:Arial,sans-serif;
background:#F5E6D3;
margin:0;
padding:0;
text-align:center;
}

header{
background:#8B4513;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.whatsapp{
display:inline-block;
margin:20px;
padding:15px 25px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:10px;
font-size:20px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.price{
color:#8B4513;
font-size:24px;
font-weight:bold;
}

button{
background:#8B4513;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
🌴 مطعم النخلة
</header>

<a class="whatsapp"
href="https://wa.me/967730244894">
تواصل عبر واتساب
</a>

<div class="card">
<h2>مندي دجاج</h2>
<p class="price">3500 ريال</p>
<button>إضافة للسلة</button>
</div>

<div class="card">
<h2>دجاج على الفحم</h2>
<p class="price">4000 ريال</p>
<button>إضافة للسلة</button>
</div>

<div class="card">
<h2>بيتزا دجاج</h2>
<p class="price">3000 ريال</p>
<button>إضافة للسلة</button>
</div>

</body>
</html>
