<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطاعم ومطابخ النخلة</title>

<link rel="stylesheet" href="css/style.css">

<script src="js/products.js"></script>
</head>

<body>

<header>

<button class="menu-btn">☰</button>

<div class="brand">
<h1>مطاعم ومطابخ النخلة</h1>
<p>أشهى المأكولات اليمنية</p>
</div>

<a href="cart.html" class="cart-btn">
🛒
</a>

</header>

<section class="hero">

<img src="images/logo.png" class="hero-logo">

<h2>مرحباً بكم في مطاعم النخلة</h2>

<p>
اطلب وجبتك المفضلة بسهولة
</p>

</section>

<a
class="whatsapp-btn"
href="https://wa.me/967730244894"
target="_blank">
📱 اطلب عبر واتساب
</a>

<div class="categories">

<button>🍽️ وجبات رئيسية</button>
<button>🔥 مشويات</button>
<button>🥗 مقبلات</button>
<button>🍕 بيتزا</button>
<button>🥤 مشروبات</button>

</div>

<div class="products" id="productsContainer"></div>

<a href="cart.html" class="cart-float">
🛒
</a>

<script>

const container =
document.getElementById("productsContainer");

products.forEach(product=>{

container.innerHTML += `

<div class="card">

<img src="${product.image}">

<div class="card-body">

<div class="category">
${product.category}
</div>

<h3>${product.name}</h3>

<div class="price">
${product.price} ريال
</div>

<button
class="add-btn"
onclick="addToCart(${product.id})">
إضافة للسلة
</button>

</div>

</div>

`;

});

function addToCart(id){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let item =
cart.find(p=>p.id===id);

if(item){

item.qty++;

}else{

let product =
products.find(p=>p.id===id);

cart.push({
...product,
qty:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("تمت إضافة المنتج للسلة");

}

</script>

</body>

</html>
