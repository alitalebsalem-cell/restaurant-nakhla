<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطاعم ومطابخ النخلة</title>

<link rel="stylesheet" href="css/style.css">

<script src="js/products.js"></script>
</head>

<body>

<!-- Header -->

<header class="header">

<button class="icon-btn">
☰
</button>

<div class="header-center">
<div class="header-title">
مطاعم ومطابخ النخلة
</div>

<div class="header-sub">
أشهى المأكولات اليمنية
</div>
</div>

<a href="cart.html" style="text-decoration:none;position:relative">

<span style="font-size:30px">🛒</span>

<span id="cartCount" class="cart-count">
0
</span>

</a>

</header>

<!-- Hero -->

<section class="hero">

<img
src="images/logo.png"
class="hero-logo"
>

<div class="hero-title">
مرحباً بكم
</div>

<div class="hero-desc">
اطلب وجبتك المفضلة بسهولة
</div>

</section>

<a
class="whatsapp"
href="https://wa.me/967730244894"
target="_blank">
📱 اطلب عبر واتساب
</a>

<!-- Categories -->

<div class="categories">

<button
class="cat-btn active"
onclick="filterProducts('all',this)">
الكل
</button>

<button
class="cat-btn"
onclick="filterProducts('وجبات رئيسية',this)">
وجبات رئيسية
</button>

<button
class="cat-btn"
onclick="filterProducts('مشويات',this)">
مشويات
</button>

<button
class="cat-btn"
onclick="filterProducts('مقبلات',this)">
مقبلات
</button>

<button
class="cat-btn"
onclick="filterProducts('بيتزا',this)">
بيتزا
</button>

<button
class="cat-btn"
onclick="filterProducts('مشروبات',this)">
مشروبات
</button>

</div>

<!-- Products -->

<div
class="products"
id="productsContainer">
</div>

<!-- Floating Cart -->

<a
href="cart.html"
class="cart-floating">

🛒

<span
id="cartCount2"
class="cart-count">
0
</span>

</a>

<script>

const container =
document.getElementById(
"productsContainer"
);

function renderProducts(list){

container.innerHTML = "";

list.forEach(product=>{

container.innerHTML += `

<div class="product-card">

<img
src="${product.image}"
class="product-image">

<div class="product-content">

<div class="product-category">
${product.category}
</div>

<div class="product-name">
${product.name}
</div>

<div class="product-price">
${product.price} ريال
</div>

<button
class="add-btn"
onclick="addToCart(${product.id})">
إضافة للسلة
</button>

</div>

</div>

`;

});

}

renderProducts(products);

function filterProducts(category,btn){

document
.querySelectorAll(".cat-btn")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

if(category==="all"){

renderProducts(products);

return;

}

let filtered =
products.filter(
p=>p.category===category
);

renderProducts(filtered);

}

function addToCart(id){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let item =
cart.find(
x=>x.id===id
);

if(item){

item.qty++;

}else{

let product =
products.find(
x=>x.id===id
);

cart.push({
...product,
qty:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCartCounter();

alert("تمت إضافة المنتج للسلة");

}

function updateCartCounter(){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let total = 0;

cart.forEach(item=>{
total += item.qty;
});

document
.getElementById("cartCount")
.innerText = total;

document
.getElementById("cartCount2")
.innerText = total;

}

updateCartCounter();

</script>

</body>
</html>
